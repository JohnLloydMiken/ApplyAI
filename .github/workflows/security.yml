# ─────────────────────────────────────────────────────────────
# WORKFLOW: Security audit
# Scans your npm dependencies for known vulnerabilities.
# Runs automatically every Monday and on every push to main.
# ─────────────────────────────────────────────────────────────

name: Security audit

# ── TRIGGERS ──────────────────────────────────────────────────
# This workflow has TWO triggers — both are listed under "on:"
on:
  # Trigger 1: whenever code lands on main
  push:
    branches: [main]

  # Trigger 2: on a schedule, using cron syntax
  # Cron format: minute  hour  day-of-month  month  day-of-week
  # "0 9 * * 1" = at 09:00 UTC, every Monday (* = any, 1 = Monday)
  # Useful tool for building cron expressions: https://crontab.guru
  schedule:
    - cron: "0 9 * * 1"

# ── JOBS ──────────────────────────────────────────────────────
jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # npm audit scans your installed packages against a database
      # of known security vulnerabilities (CVEs).
      # "--audit-level=high" means: only fail on HIGH or CRITICAL issues.
      # Change to "moderate" to be stricter, "critical" to be more lenient.
      - name: Run security audit
        run: npm audit --audit-level=high